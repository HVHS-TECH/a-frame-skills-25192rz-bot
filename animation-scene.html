<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Radioactive Signals</title>
    </head>
    <body>
        <a-scene>
            <!-- Set the sky -->
            <a-sky color="black"></a-sky>

            <a-box color="limegreen" position="3 1.5 -2"
                animation="
                    property: position;
                    from: 3 1.5 -2;
                    to: -3 1.5 -2
                    dir: 10000;
                    loop: true;
                    dir: alternate;
                "
                animation__rotation="
                    property: rotation;
                    from: 0 0 0;
                    to: 0 360 0;
                    dir: 10000;
                    loop: true;
                    dir: alternate;
                "
                
                    
            
            
            
            ></a-box>

        </a-scene>
    </body>
</html>
